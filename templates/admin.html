<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Master · {{.QuizID}}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<main class="mx-auto max-w-6xl px-4 py-6">

  <header class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <div class="flex items-center gap-2">
        <span class="text-2xl">{{.Emoji}}</span>
        <h1 class="text-2xl font-black">Quiz Master</h1>
        <span class="rounded-full bg-{{.Accent}}-500/20 text-{{.Accent}}-300 px-3 py-0.5 text-sm font-semibold">{{.Difficulty}}</span>
      </div>
      <p class="text-slate-500 text-sm mt-1">World Cup 2026 · {{.Points}} pts per question</p>
      <div class="mt-3 inline-flex items-center gap-2">
        <label for="lang" class="text-xs font-semibold text-slate-400">🌐 Question language</label>
        <select id="lang" onchange="setLang(this.value)"
          class="rounded-lg border border-{{.Accent}}-500/40 bg-slate-900 px-3 py-1.5 text-sm font-semibold text-slate-100 focus:outline-none focus:ring-2 focus:ring-{{.Accent}}-500">
          {{range .Languages}}<option value="{{.Code}}" {{if eq .Code $.Lang}}selected{{end}}>{{.Label}}</option>{{end}}
        </select>
      </div>
    </div>
    <div class="text-right">
      <div class="text-xs text-slate-500">Join code</div>
      <div class="text-3xl font-black tracking-widest text-{{.Accent}}-400">{{.QuizID}}</div>
    </div>
  </header>

  <div id="progress" class="mb-4 hidden">
    <div class="flex justify-between text-xs text-slate-500 mb-1">
      <span id="progressLabel"></span>
      <span id="answeredLabel"></span>
    </div>
    <div class="h-2 rounded-full bg-slate-800 overflow-hidden">
      <div id="progressBar" class="h-full bg-{{.Accent}}-500 transition-all" style="width:0%"></div>
    </div>
  </div>

  <div class="grid gap-6 lg:grid-cols-3">
    <!-- Left / main column -->
    <section class="lg:col-span-2 space-y-4">
      <div id="stage" class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 min-h-[280px]"></div>

      <div class="flex flex-wrap gap-3">
        <button id="btnStart"  onclick="act('start')"  class="hidden rounded-xl bg-{{.Accent}}-500 hover:bg-{{.Accent}}-400 px-5 py-3 font-bold text-slate-950">▶ Start quiz</button>
        <button id="btnReveal" onclick="act('reveal')" class="hidden rounded-xl bg-amber-500 hover:bg-amber-400 px-5 py-3 font-bold text-slate-950">✔ Reveal &amp; score</button>
        <button id="btnNext"   onclick="act('next')"   class="hidden rounded-xl bg-{{.Accent}}-500 hover:bg-{{.Accent}}-400 px-5 py-3 font-bold text-slate-950">Next question →</button>
        <button id="btnReset"  onclick="if(confirm('Reset all scores and return to the lobby?'))act('reset')" class="rounded-xl border border-slate-700 hover:bg-slate-800 px-4 py-3 text-sm text-slate-400">↺ Reset</button>
      </div>
    </section>

    <!-- Right column: scoreboard -->
    <aside class="space-y-4">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold">Scoreboard</h2>
          <span id="teamCount" class="text-xs text-slate-500"></span>
        </div>
        <ol id="board" class="space-y-2"></ol>
      </div>
    </aside>
  </div>
</main>

<!-- QR modal / lobby join panel template lives in JS -->
<script>
const QUIZ = "{{.QuizID}}";
const TOKEN = "{{.Token}}";
const JOIN_URL = "{{.JoinURL}}";
const ACCENT = "{{.Accent}}";
const MIXED = {{if .Mixed}}true{{else}}false{{end}};
const DIFFS = [{{range .DiffOptions}}{key:"{{.Key}}",title:"{{.Title}}",emoji:"{{.Emoji}}"},{{end}}];
const LANGS = [{{range .Languages}}{code:"{{.Code}}",label:"{{.Label}}"},{{end}}];
let CURRENT_LANG = "{{.Lang}}";
function LANG_LABEL(){ const l = LANGS.find(l=>l.code===CURRENT_LANG); return l ? l.label : CURRENT_LANG; }
const optionLabels = ["A","B","C","D","E"];
const optionColors = ["bg-rose-500","bg-sky-500","bg-amber-500","bg-emerald-500","bg-violet-500"];

async function act(action, extra){
  const body = new URLSearchParams(extra||{});
  await fetch(`/api/admin/${QUIZ}/${action}?t=${TOKEN}`, {method:"POST", body});
  poll();
}

// setLang changes the question language for everyone. It takes effect on the
// next poll for the quizmaster and all joined players.
async function setLang(lang){
  CURRENT_LANG = lang;
  await act("setlang", {lang});
}

function lobbyHTML(s){
  return `
  <div class="text-center">
    <h2 class="text-xl font-bold mb-1">Waiting for teams…</h2>
    <p class="text-slate-400 text-sm mb-3">Have everyone scan the QR code or open the link below to join.</p>
    <p class="mb-5 inline-block rounded-xl border border-${ACCENT}-500/30 bg-${ACCENT}-500/10 px-4 py-2 text-sm text-${ACCENT}-200">🌐 Set the <span class="font-semibold">question language</span> at the top before you start — currently <span class="font-semibold">${LANG_LABEL()}</span>.</p>
    <div class="inline-block rounded-2xl bg-white p-4 shadow-lg">
      <img src="/qr/${QUIZ}" alt="Join QR code" width="260" height="260" class="block">
    </div>
    <div class="mt-4 text-sm text-slate-400">or visit</div>
    <div class="font-mono text-${ACCENT}-400 break-all">${JOIN_URL}</div>
    <div class="mt-2 text-slate-500 text-sm">Join code: <span class="font-bold tracking-widest">${QUIZ}</span></div>
    <p class="mt-6 text-slate-500 text-sm">${s.teamCount} team${s.teamCount===1?"":"s"} joined ${s.teamCount===0?"— need at least one to start":""}</p>
    ${MIXED && s.teamCount>0 ? `<p class="mt-2 text-violet-300 text-sm">🎲 Set each team's difficulty in the scoreboard → everyone scores equal points.</p>` : ""}
  </div>`;
}

// mixedStageHTML is shown to the quizmaster during a mixed-mode question, where
// each team answers its own question on its own device.
function mixedStageHTML(s){
  const reveal = s.phase === "revealed";
  return `
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-semibold uppercase tracking-wide text-${ACCENT}-400">Question ${s.current+1} of ${s.total}</span>
      <span class="text-xs text-slate-500">${s.answeredCount}/${s.teamCount} teams answered</span>
    </div>
    <div class="grid place-items-center min-h-[180px] text-center">
      <div>
        <div class="text-5xl mb-3">🎲</div>
        <h2 class="text-xl font-bold mb-1">Mixed difficulty round</h2>
        <p class="text-slate-400 text-sm max-w-sm">Each team has its own question on their device. ${reveal ? "Answers are revealed — every correct team scored "+s.points+" points." : "Hit <span class=\"text-slate-200 font-semibold\">Reveal &amp; score</span> when everyone has locked in."}</p>
      </div>
    </div>`;
}

function questionHTML(s){
  const reveal = s.phase === "revealed";
  let opts = s.options.map((o,i)=>{
    const correct = reveal && i === s.answer;
    const ring = correct ? "ring-4 ring-emerald-400" : "opacity-90";
    const mark = correct ? '<span class="ml-auto text-emerald-200 text-2xl">✔</span>' : '';
    return `<div class="flex items-center gap-3 rounded-xl ${optionColors[i]} ${ring} px-4 py-3 text-white font-semibold">
      <span class="grid place-items-center h-7 w-7 rounded-lg bg-black/20 font-black">${optionLabels[i]}</span>
      <span>${escapeHTML(o)}</span>${mark}</div>`;
  }).join("");
  let fact = reveal && s.fact ? `<div class="mt-4 rounded-xl bg-slate-800/70 border border-slate-700 px-4 py-3 text-sm text-slate-300">💡 ${escapeHTML(s.fact)}</div>` : "";
  return `
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-semibold uppercase tracking-wide text-${ACCENT}-400">Question ${s.current+1} of ${s.total}</span>
      <span class="text-xs text-slate-500">${s.answeredCount}/${s.teamCount} teams answered</span>
    </div>
    <h2 class="text-2xl font-bold mb-5 leading-snug">${escapeHTML(s.question)}</h2>
    <div class="grid gap-3 sm:grid-cols-2">${opts}</div>
    ${fact}`;
}

function finishedHTML(s){
  const podium = s.teams.slice(0,3);
  const medals = ["🥇","🥈","🥉"];
  let rows = podium.map((t,i)=>`
    <div class="flex items-center gap-3 rounded-xl bg-slate-800/60 px-4 py-3">
      <span class="text-3xl">${medals[i]||""}</span>
      <span class="font-bold text-lg">${escapeHTML(t.name)}</span>
      <span class="ml-auto font-black text-${ACCENT}-400 text-xl">${t.score}</span>
    </div>`).join("");
  return `
    <div class="text-center mb-5">
      <div class="text-5xl mb-2">🏆</div>
      <h2 class="text-2xl font-black">Full time!</h2>
      <p class="text-slate-400 text-sm">${s.teams.length ? (escapeHTML(s.teams[0].name)+" takes the crown") : "No teams played"}</p>
    </div>
    <div class="space-y-2">${rows}</div>`;
}

function renderBoard(s){
  const board = document.getElementById("board");
  // While the quizmaster has a team-difficulty <select> open — especially on
  // mobile, where the native picker is modal — don't rebuild the board. Doing
  // so destroys the open <select>, snapping the picker shut moments after a tap.
  const active = document.activeElement;
  if(active && active.tagName === "SELECT" && board.contains(active)) return;
  document.getElementById("teamCount").textContent = `${s.teamCount} team${s.teamCount===1?"":"s"}`;
  if(!s.teams.length){ board.innerHTML = '<li class="text-slate-500 text-sm">No teams yet.</li>'; return; }
  board.innerHTML = s.teams.map((t,i)=>{
    let badge = "";
    if(s.phase==="question") badge = t.answered ? '<span class="text-emerald-400 text-xs">●&nbsp;in</span>' : '<span class="text-slate-600 text-xs">○ waiting</span>';
    if(s.phase==="revealed") badge = t.choice<0 ? '<span class="text-slate-600 text-xs">—</span>' : (t.correct ? '<span class="text-emerald-400 text-xs">✔ +'+s.points+'</span>' : '<span class="text-rose-400 text-xs">✗</span>');
    // Mixed mode: in the lobby, let the quizmaster pick each team's difficulty;
    // once started, just show the assigned level as a badge.
    let diffCell = "";
    if(MIXED){
      if(s.phase==="lobby"){
        const opts = DIFFS.map(d=>`<option value="${d.key}" ${t.difficulty===d.key?"selected":""}>${d.emoji} ${d.title}</option>`).join("");
        diffCell = `<select onchange="act('setdiff',{team:'${t.id}',difficulty:this.value})" class="rounded-lg border border-slate-700 bg-slate-900 px-1.5 py-1 text-xs text-slate-200">${opts}</select>`;
      } else {
        const d = DIFFS.find(d=>d.key===t.difficulty);
        diffCell = d ? `<span class="rounded-full bg-slate-700/70 px-2 py-0.5 text-xs text-slate-300">${d.emoji} ${d.title}</span>` : "";
      }
    }
    return `<li class="flex items-center gap-2 rounded-xl bg-slate-800/50 px-3 py-2">
      <span class="text-slate-500 w-5 text-center text-sm">${i+1}</span>
      <span class="font-semibold truncate">${escapeHTML(t.name)}</span>
      ${diffCell}
      ${badge}
      <span class="ml-auto font-black text-${ACCENT}-400">${t.score}</span>
      <span class="flex gap-1">
        <button onclick="act('adjust',{team:'${t.id}',delta:'${s.points}'})" class="h-6 w-6 rounded bg-slate-700 hover:bg-emerald-600 text-xs">+</button>
        <button onclick="act('adjust',{team:'${t.id}',delta:'-${s.points}'})" class="h-6 w-6 rounded bg-slate-700 hover:bg-rose-600 text-xs">−</button>
      </span>
    </li>`;
  }).join("");
}

function renderControls(s){
  show("btnStart",  s.phase==="lobby" && s.teamCount>0);
  show("btnReveal", s.phase==="question");
  show("btnNext",   s.phase==="revealed");
  const prog = document.getElementById("progress");
  if(s.phase==="question"||s.phase==="revealed"){
    prog.classList.remove("hidden");
    document.getElementById("progressLabel").textContent = `Question ${s.current+1} / ${s.total}`;
    document.getElementById("answeredLabel").textContent = `${s.answeredCount}/${s.teamCount} answered`;
    document.getElementById("progressBar").style.width = ((s.current+1)/s.total*100)+"%";
    document.getElementById("btnNext").textContent = (s.current+1>=s.total) ? "Finish 🏁" : "Next question →";
  } else {
    prog.classList.add("hidden");
  }
}

function show(id,on){ document.getElementById(id).classList.toggle("hidden", !on); }
function escapeHTML(s){ return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function poll(){
  try{
    const r = await fetch(`/api/state/${QUIZ}?t=${TOKEN}`);
    if(!r.ok) return;
    const s = await r.json();
    // Reflect the server's language (e.g. set from another tab) without
    // clobbering the dropdown while the quizmaster is actively using it.
    if(s.lang){
      CURRENT_LANG = s.lang;
      const sel = document.getElementById("lang");
      if(sel && sel !== document.activeElement) sel.value = s.lang;
    }
    const stage = document.getElementById("stage");
    if(s.phase==="lobby") stage.innerHTML = lobbyHTML(s);
    else if(s.phase==="finished") stage.innerHTML = finishedHTML(s);
    else if(MIXED) stage.innerHTML = mixedStageHTML(s);
    else stage.innerHTML = questionHTML(s);
    renderBoard(s);
    renderControls(s);
  }catch(e){ /* transient */ }
}
poll();
setInterval(poll, 1500);
</script>
</body>
</html>
